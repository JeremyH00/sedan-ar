<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>SEDAN AR</title>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body{
      margin:0;
      background:#eaeaea;
      font-family: Arial, Helvetica, sans-serif;
    }
    model-viewer{
      width:100%;
      height:100vh;
    }
  </style>
</head>

<body>

<model-viewer
  src="SEDAN.glb"
  ar
  ar-modes="scene-viewer webxr quick-look"
  camera-controls
  auto-rotate
  shadow-intensity="1"
  alt="Sedan 3D AR">
</model-viewer>

</body>
</html>
